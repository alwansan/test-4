name: Build B-Ultra APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: false
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Buildozer Global Directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-global-${{ runner.os }}-

    - name: Cache Buildozer Project Directory
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-project-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-project-${{ runner.os }}-

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev libssl-dev zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libmtdev1

    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer "Cython<3.0.0" virtualenv

    - name: Fix SDKManager Issue (Pre-download cmdline-tools)
      run: |
        SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_DIR/cmdline-tools
        cd $SDK_DIR/cmdline-tools
        if [ ! -d "latest" ]; then
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
        fi
        yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Patch main.py (Inject SSL fixes)
      run: python .ci/patch_main.py

    - name: Build APK with Buildozer
      run: |
        yes '' | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: B-Ultra-APK
        path: bin/*.apk
