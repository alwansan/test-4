name: Build B-Ultra APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: false # نحتاج الأندرويد لذا لن نحذفه
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev libssl-dev zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libmtdev1

    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer "Cython<3.0.0" virtualenv

    - name: Fix SDKManager Issue (Pre-download cmdline-tools)
      run: |
        # هذا السطر يحل المشكلة التي ظهرت لك (sdkmanager path does not exist)
        SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_DIR/cmdline-tools
        cd $SDK_DIR/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mv cmdline-tools latest
        rm cmdline-tools.zip
        yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Patch main.py (Inject SSL fixes)
      run: python .ci/patch_main.py

    - name: Build APK with Buildozer
      run: |
        # وضعنا yes '' لتجاوز أي أسئلة بنعم
        yes '' | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: B-Ultra-APK
        path: bin/*.apk
