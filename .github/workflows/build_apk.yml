name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.10

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y           build-essential           autoconf           automake           libtool           pkg-config           zlib1g-dev           libncurses5-dev           libffi-dev           libssl-dev           unzip           cmake           git

    - name: Install Python deps
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 buildozer

    - name: Install Android cmdline-tools
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
        unzip tools.zip
        mv cmdline-tools latest

        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

    - name: Accept licenses
      run: yes | sdkmanager --licenses

    - name: Install SDK
      run: |
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Fix sdkmanager path
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
        ln -s $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager           $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

    - name: Build APK
      run: |
        echo "Java: $(java -version 2>&1 | head -1)"
        echo "Python: $(python --version)"

        yes '' | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: bultra-apk
        path: bin/*.apk
